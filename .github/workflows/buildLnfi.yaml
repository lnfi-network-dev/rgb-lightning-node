name: Build

on:
  push:
    tags: [ 'v*' ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.os }}
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: ilammy/setup-nasm@v1
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ""
      - name: Build
        run: cargo build --release

      - name: Prepare Release Binaries (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p release-binaries
          cp target/release/rgb-lightning-node release-binaries/rgb-lightning-node-linux-x86_64
          chmod +x release-binaries/rgb-lightning-node-linux-x86_64

      - name: Prepare Release Binaries (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p release-binaries
          cp target/release/rgb-lightning-node.exe release-binaries/rgb-lightning-node-windows-x86_64.exe

      - name: Prepare Release Binaries (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p release-binaries
          cp target/release/rgb-lightning-node release-binaries/rgb-lightning-node-macos-x86_64
          chmod +x release-binaries/rgb-lightning-node-macos-x86_64

      - name: Upload Artifacts (for non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-binaries
          path: release-binaries/*

      - name: Upload to Release (for tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: release-binaries/*
          token: ${{ secrets.GITHUB_TOKEN }}
